plugins {
  id 'application'
  id 'org.openjfx.javafxplugin' version '0.1.0'
  id 'org.beryx.jlink' version '3.0.1'
}

repositories {
  mavenCentral()
}

java {
  toolchain {
    languageVersion = JavaLanguageVersion.of(21)
  }
}

javafx {
  version = '21.0.10'
  modules = ['javafx.controls']
}

application {
  mainModule = 'chi.dijkstra'
  mainClass = 'chi.dijkstra.MainApp'
}
